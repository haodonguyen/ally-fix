# Render Blueprint for AllyFix. Deploy both services from one repo.
# Postgres + Redis are external (Neon + Upstash) for a durable free tier — set
# their URLs as env vars in the Render dashboard (marked `sync: false` below).
#
# Cost note: Render's free tier only applies to web services (they spin down when
# idle and wake on the next request). The scanner is a background worker that must
# stay running with enough RAM for Chromium, so it needs a paid instance
# (starter). See DEPLOY.md for free alternatives (Fly.io, or run the worker on
# demand) if you don't want an always-on cost.
services:
  - type: web
    name: allyfix-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: DAILY_AUDIT_LIMIT_PER_IP
        value: "10"

  - type: worker
    name: allyfix-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    # Chromium needs memory; the free plan (512 MB) is prone to OOM. Starter or above.
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
